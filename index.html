<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانيتي السحابية 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        .cloud-btn { transition: all 0.3s ease; cursor: pointer; }
        .cloud-btn:hover { transform: scale(1.1); color: #3b82f6; }
        input { background: #f1f5f9; border-radius: 8px; padding: 4px 8px; font-weight: bold; width: 90px; text-align: center; }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-6">
            <div class="floating text-6xl mb-2">☁️</div>
            <h1 class="text-2xl font-bold text-slate-800">ميزانيتي في السحابة</h1>
            <p class="text-slate-500 text-sm">بياناتك محفوظة وآمنة</p>
        </div>

        <div class="glass-card p-6 mb-6 flex justify-around items-center border-b-4 border-blue-500">
            <div class="text-center">
                <p class="text-xs text-slate-400">المتبقي</p>
                <div id="display-remaining" class="text-3xl font-bold text-emerald-600">0</div>
            </div>
            <div onclick="saveToCloud()" class="cloud-btn text-center">
                <i data-lucide="cloud-upload" class="w-10 h-10 mx-auto"></i>
                <p class="text-[10px] font-bold mt-1">حفظ الآن</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="glass-card p-4 flex justify-between items-center">
                <span class="font-bold text-slate-700">💰 مجموع الدخل</span>
                <input type="number" id="total-in" value="20996" oninput="calculate()">
            </div>

            <div class="glass-card p-4">
                <h3 class="font-bold mb-3 text-red-500 flex items-center gap-2">
                    <i data-lucide="minus-circle" class="w-4 h-4"></i> المصاريف الأساسية
                </h3>
                <div id="exp-list" class="space-y-3 text-sm">
                    </div>
            </div>
        </div>

        <p id="save-status" class="text-center text-xs text-emerald-500 mt-4 opacity-0 transition-opacity">✅ تم الحفظ في سحابتك الشخصية</p>
    </div>

    <script>
        lucide.createIcons();

        const expenses = [
            {name: "بر الوالدة ❤️", val: 300},
            {name: "قسط البيت 🏠", val: 6566},
            {name: "الكهرباء والماء ⚡", val: 844},
            {name: "الإنترنت والاتصالات 🌐", val: 690},
            {name: "زبود وقرض 💳", val: 4550},
            {name: "نقل وتجميع 🚌", val: 2850}
        ];

        function init() {
            const list = document.getElementById('exp-list');
            // محاولة تحميل بيانات قديمة إذا وجدت
            const saved = localStorage.getItem('myBudget');
            const data = saved ? JSON.parse(saved) : expenses;

            data.forEach((item, i) => {
                list.innerHTML += `
                    <div class="flex justify-between items-center">
                        <span>${item.name}</span>
                        <input type="number" class="exp-val" value="${item.val}" oninput="calculate()">
                    </div>
                `;
            });
            calculate();
        }

        function calculate() {
            const totalIn = parseFloat(document.getElementById('total-in').value) || 0;
            const expInputs = document.querySelectorAll('.exp-val');
            let totalExp = 0;
            expInputs.forEach(input => totalExp += parseFloat(input.value) || 0);
            
            document.getElementById('display-remaining').innerText = (totalIn - totalExp).toLocaleString();
        }

        function saveToCloud() {
            // حالياً يحفظ في ذاكرة المتصفح (الخطوة الأولى للسحابة)
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 2000);
            
            // هنا يمكنك مستقبلاً وضع كود Firebase الموضح في صورتك
            console.log("Saving to Firebase...");
        }

        window.onload = init;
    </script>
</body>
</html>
