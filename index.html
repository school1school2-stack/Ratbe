<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية أبو نواف 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        input { background: transparent; border: none; font-weight: bold; width: 85px; text-align: center; color: #1e293b; outline: none; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .save-btn { transition: all 0.3s; cursor: pointer; }
        .save-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <div class="inline-block px-6 py-2 bg-white/50 rounded-full mb-4 text-blue-600 font-bold tracking-widest shadow-sm">
                مرحباً بك.. أَبُـو نَـوَاف
            </div>
            <h1 class="text-3xl font-bold text-slate-800 flex justify-center items-center gap-3">
                <span class="pulse text-4xl">💎</span> مدير ميزانية 2026
            </h1>
            <p class="text-slate-500 mt-2 italic">"بارك الله لك في رزقك وفيما أعطيت"</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 text-center border-t-4 border-blue-500">
                <div class="text-4xl mb-2">💰</div>
                <div class="text-slate-500 text-sm">إجمالي الدخل</div>
                <div id="display-income" class="text-2xl font-bold text-blue-600">0</div>
            </div>
            <div class="glass-card p-6 text-center border-t-4 border-red-400">
                <div class="text-4xl mb-2">💸</div>
                <div class="text-slate-500 text-sm">إجمالي المصاريف</div>
                <div id="display-expenses" class="text-2xl font-bold text-red-500">0</div>
            </div>
            <div class="glass-card p-6 text-center border-t-4 border-emerald-500 bg-emerald-50/50">
                <div class="text-4xl mb-2">🌿</div>
                <div class="text-slate-500 text-sm">المتبقي الصافي</div>
                <div id="display-remaining" class="text-2xl font-bold text-emerald-600">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="glass-card p-6">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="trending-up" class="text-blue-500"></i> مصادر الدخل
                </h2>
                <div class="space-y-4" id="income-list">
                    <div class="flex justify-between items-center p-3 hover:bg-white rounded-xl transition">
                        <span>الراتب الأساسي</span>
                        <div class="bg-slate-100 p-2 rounded-lg">
                            <input type="number" value="18072" oninput="updateAll()" id="inc-1"> <span class="text-xs text-slate-400">ريال</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center p-3 hover:bg-white rounded-xl transition">
                        <span>حساب المواطن</span>
                        <div class="bg-slate-100 p-2 rounded-lg">
                            <input type="number" value="1100" oninput="updateAll()" id="inc-2"> <span class="text-xs text-slate-400">ريال</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center p-3 hover:bg-white rounded-xl transition">
                        <span>الدعم</span>
                        <div class="bg-slate-100 p-2 rounded-lg">
                            <input type="number" value="1913" oninput="updateAll()" id="inc-3"> <span class="text-xs text-slate-400">ريال</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="glass-card p-6 flex flex-col">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="shopping-cart" class="text-red-400"></i> المصاريف والمدخرات
                </h2>
                <div class="space-y-3 overflow-y-auto max-h-[300px] pr-2 mb-4" id="expenses-list"></div>
                
                <div class="mt-auto space-y-3">
                    <button onclick="addExpense()" class="w-full py-2 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 hover:bg-white transition text-sm">+ إضافة بند جديد</button>
                    <button onclick="saveToCloud()" class="save-btn w-full py-3 bg-blue-600 text-white rounded-xl shadow-lg flex items-center justify-center gap-2 font-bold hover:bg-blue-700">
                        <i data-lucide="save" class="w-5 h-5"></i> حفظ التغييرات الآن
                    </button>
                </div>
            </section>
        </div>
        
        <p id="save-msg" class="text-center mt-6 text-emerald-600 font-bold opacity-0 transition-opacity">✅ تم الحفظ بنجاح يا أبو نواف!</p>
    </div>

    <script>
        lucide.createIcons();

        const defaultExpenses = [
            { name: "بر الوالدة ❤️", val: 300 },
            { name: "قسط البيت 🏠", val: 6566 },
            { name: "الكهرباء ⚡", val: 744 },
            { name: "الإنترنت 🌐", val: 690 },
            { name: "الماء 💧", val: 100 },
            { name: "زبود 🛒", val: 1600 },
            { name: "نقل طيف ولمى 🚌", val: 350 },
            { name: "قرض بنكي 💳", val: 2950 },
            { name: "تجميع الديرة 🏦", val: 2500 }
        ];

        function init() {
            // 1. استرداد الدخل المحفوظ
            const savedIncome = localStorage.getItem('abu_nawaf_income');
            if (savedIncome) {
                const incData = JSON.parse(savedIncome);
                document.getElementById('inc-1').value = incData.in1;
                document.getElementById('inc-2').value = incData.in2;
                document.getElementById('inc-3').value = incData.in3;
            }

            // 2. استرداد المصاريف المحفوظة
            const savedExpenses = localStorage.getItem('abu_nawaf_expenses');
            const finalExpenses = savedExpenses ? JSON.parse(savedExpenses) : defaultExpenses;

            document.getElementById('expenses-list').innerHTML = ''; // تنظيف القائمة
            finalExpenses.forEach(item => {
                renderExpense(item.name, item.val);
            });

            updateAll();
        }

        function renderExpense(name, val) {
            const list = document.getElementById('expenses-list');
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-3 hover:bg-white rounded-xl transition border-b border-slate-50";
            div.innerHTML = `
                <span class="text-sm text-slate-600">${name}</span>
                <div class="bg-red-50 p-2 rounded-lg">
                    <input type="number" value="${val}" oninput="updateAll()" class="exp-input text-red-600">
                </div>
            `;
            list.appendChild(div);
        }

        function updateAll() {
            const in1 = parseFloat(document.getElementById('inc-1').value) || 0;
            const in2 = parseFloat(document.getElementById('inc-2').value) || 0;
            const in3 = parseFloat(document.getElementById('inc-3').value) || 0;
            const totalIn = in1 + in2 + in3;

            const expInputs = document.querySelectorAll('.exp-input');
            let totalExp = 0;
            expInputs.forEach(input => totalExp += parseFloat(input.value) || 0);

            document.getElementById('display-income').innerText = totalIn.toLocaleString();
            document.getElementById('display-expenses').innerText = totalExp.toLocaleString();
            document.getElementById('display-remaining').innerText = (totalIn - totalExp).toLocaleString();
        }

        function addExpense() {
            const name = prompt("ما هو البند الجديد؟");
            if (name) {
                renderExpense(name, 0);
                updateAll();
            }
        }

        function saveToCloud() {
            // حفظ الدخل
            const incomeData = {
                in1: document.getElementById('inc-1').value,
                in2: document.getElementById('inc-2').value,
                in3: document.getElementById('inc-3').value
            };
            localStorage.setItem('abu_nawaf_income', JSON.stringify(incomeData));

            // حفظ المصاريف
            const expInputs = document.querySelectorAll('.exp-input');
            const currentExpenses = [];
            expInputs.forEach(input => {
                const name = input.closest('div').parentElement.querySelector('span').innerText;
                currentExpenses.push({ name, val: parseFloat(input.value) || 0 });
            });
            localStorage.setItem('abu_nawaf_expenses', JSON.stringify(currentExpenses));
            
            // إظهار رسالة النجاح
            const msg = document.getElementById('save-msg');
            msg.classList.remove('opacity-0');
            setTimeout(() => msg.classList.add('opacity-0'), 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
